name: Deploy Website to GCP

on:
  push:
    branches:
      - main

# This line fixes the warning you saw 
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync files to VM
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.GCP_VM_IP }}
          REMOTE_USER: ${{ secrets.GCP_SSH_USER }}
          TARGET: /var/www/html/ 
          SOURCE: ./
          # Added 'media/' to the EXCLUDE list
          EXCLUDE: "/.git/, /.github/, .gitignore, /media/"
          ARGS: "-avzr --delete"

      - name: Restart Nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_VM_IP }}
          username: ${{ secrets.GCP_SSH_USER }}
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          # We use sudo -n (non-interactive) just to be extra safe
          script: sudo -n systemctl reload nginx